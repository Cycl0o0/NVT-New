name: NVT
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    visionOS: "1.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 2.0
targets:
  NVT:
    type: application
    supportedDestinations:
      - iOS
      - macOS
      - visionOS
    sources:
      - path: NVTCore
      - path: NVTUIShared
      - path: NVTApp
    info:
      path: NVTApp/Info.plist
      properties:
        CFBundleDisplayName: NVT
        LSApplicationCategoryType: public.app-category.travel
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: NVT connects to your local transit backend to load live lines, vehicles, and departures.
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.Cycl0o0.NVT
        PRODUCT_NAME: NVT
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
    scheme:
      gatherCoverageData: false
  NVT Watch:
    type: application
    platform: watchOS
    sources:
      - path: NVTCore
      - path: NVTUIShared
      - path: NVTWatch
    info:
      path: NVTWatch/Info.plist
      properties:
        CFBundleDisplayName: NVT
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.Cycl0o0.NVT.watch
        PRODUCT_NAME: NVT
        CODE_SIGN_STYLE: Automatic
    scheme:
      gatherCoverageData: false
